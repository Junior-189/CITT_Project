name: CITT CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'
  POSTGRES_DB: citt_test
  POSTGRES_USER: citt_test
  POSTGRES_PASSWORD: test_password

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            CITT_Server/package-lock.json
            CITT_Client/package-lock.json

      - name: Install Server Dependencies
        working-directory: CITT_Server
        run: npm ci

      - name: Install Client Dependencies
        working-directory: CITT_Client
        run: npm ci

      - name: Run Server Lint
        working-directory: CITT_Server
        run: npm run lint || true

      - name: Run Client Lint
        working-directory: CITT_Client
        run: npm run lint || true

      - name: Run Server Tests
        working-directory: CITT_Server
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          JWT_SECRET: test_jwt_secret
          REDIS_URL: redis://localhost:6379
        run: npm test

      - name: Build Client
        working-directory: CITT_Client
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Server Image
        uses: docker/build-push-action@v6
        with:
          context: ./CITT_Server
          push: false
          tags: citt-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Client Image
        uses: docker/build-push-action@v6
        with:
          context: ./CITT_Client
          push: false
          tags: citt-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit (Server)
        working-directory: CITT_Server
        run: npm audit --audit-level=high || true

      - name: Run npm audit (Client)
        working-directory: CITT_Client
        run: npm audit --audit-level=high || true
